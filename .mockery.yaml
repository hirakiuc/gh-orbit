# Mockery configuration for gh-orbit (v3)
# See: https://vektra.github.io/mockery/latest/v3/

template: testify
template-data:
  unroll-variadic: true

packages:
  github.com/hirakiuc/gh-orbit/internal/types:
    config:
      # Generate mocks in internal/mocks from the neutral types package
      dir: internal/mocks
      pkgname: mocks
      filename: "mock_{{ .InterfaceName | snakecase }}.go"
    
    interfaces:
      AlertRepository:
      EnrichmentRepository:
      SyncRepository:
      Repository:
      Notifier:
      Syncer:
      Enricher:
      TrafficController:
      CommandExecutor:

  github.com/hirakiuc/gh-orbit/internal/api:
    config:
      dir: internal/mocks
      pkgname: mocks
      filename: "mock_{{ .InterfaceName | snakecase }}.go"
    interfaces:
      Alerter:

  github.com/hirakiuc/gh-orbit/internal/github:
    config:
      dir: internal/mocks
      pkgname: mocks
      filename: "mock_{{ .InterfaceName | snakecase }}.go"
    interfaces:
      Client:
      RESTClient:
      GraphQLClient:
      Fetcher:
