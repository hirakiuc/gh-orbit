version: "2"

run:
  timeout: 5m
  tests: true
  linters-settings:
    govet:
      enable-all: true
    gofmt:
      simplify: true
    misspell:
      locale: US
  linters:
    enable:
      - govet
      - errcheck
      - staticcheck
      - unused
      - gosimple
      - ineffassign
      - gofmt
      - misspell
      - gosec
      - exportloopref
      - bodyclose
