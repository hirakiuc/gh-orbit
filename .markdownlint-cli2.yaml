# .markdownlint-cli2.yaml
# Centralized configuration for markdown documentation linting.

# Glob expressions to include/exclude
globs:
  - "**/*.md"
  - "!.agent/**"
  - "!.serena/**"
  - "!.gemini/**"
  - "!.entire/**"
  - "!.git/**"
  - "!node_modules/**"

# Rule configurations (Inherited from defaults, can be overridden here)
config:
  MD013: false # Disable line length check for README tables and code blocks
  MD033: false # Allow inline HTML (used for emojis/visuals)
