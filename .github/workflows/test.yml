name: Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  test:
    name: Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-26]
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Set up Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version-file: 'go.mod'

    - name: Install dependencies
      run: go mod download

    - name: Build
      run: make build

    - name: Run tests
      run: go test -v ./...

    - name: Run govulncheck
      if: matrix.os == 'ubuntu-latest'
      run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...

  native-check:
    name: Native macOS Check
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Set Xcode version
      uses: maxim-lobanov/setup-xcode@ed7a3b1fda3918c0306d1b724322adc0b8cc0a90 # v1.7.0
      with:
        xcode-version: latest

    - name: Install Native Tooling
      run: brew install swiftlint swift-format

    - name: Cache Swift Package Manager
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: native/OrbitCockpit/.build
        key: ${{ runner.os }}-spm-${{ hashFiles('native/OrbitCockpit/Package.resolved') }}
        restore-keys: |
          ${{ runner.os }}-spm-

    - name: Format Check
      run: make native/fmt

    - name: Lint Check
      run: make native/lint

    - name: Run Swift Tests
      run: make native/test
