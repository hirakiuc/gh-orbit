disabled_rules:
  - line_length
  - function_body_length
  - file_length
  - type_body_length
  - cyclomatic_complexity
  - multiple_closures_with_trailing_closure
  - trailing_whitespace
  - vertical_whitespace
  - trailing_comma

opt_in_rules:
  - force_unwrapping
  - force_cast
  - fatal_error_message
  - empty_count
  - contains_over_first_not_nil
  - array_init
  - discouraged_object_literal

force_unwrapping: error
force_cast: error

identifier_name:
  excluded:
    - i
    - j
    - x
    - y

included:
  - Sources
  - Tests
